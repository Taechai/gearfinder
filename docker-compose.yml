services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gearfinderdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gearfinderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx prisma db push
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gearfinderdb?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gearfinderdb?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - reconstructed:/app/public/reconstructed
      - uploads:/app/app/api/upload/uploaded-files

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: sh -c "cd app/jobs && celery -A celery_app worker --loglevel=info --pool=solo"
    environment:
      CELERY_BROKER_URL: pyamqp://rabbitmq:5672
      CELERY_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gearfinderdb
    depends_on:
      rabbitmq:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - reconstructed:/app/public/reconstructed
      - uploads:/app/app/api/upload/uploaded-files

  job_listener:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: sh -c "cd app/jobs && python listen_for_image_reconstruction_jobs.py"
    environment:
      CELERY_BROKER_URL: pyamqp://rabbitmq:5672
      CELERY_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gearfinderdb
    depends_on:
      rabbitmq:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    volumes:
      - reconstructed:/app/public/reconstructed
      - uploads:/app/app/api/upload/uploaded-files

volumes:
  postgres_data:
  reconstructed:
  uploads:
